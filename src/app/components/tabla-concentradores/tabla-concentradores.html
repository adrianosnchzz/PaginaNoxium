<div class="card shadow-sm border-0 p-4">
  <h4 class="mb-4" style="color: #1a365d; font-weight: bold;">Listado de concentradores</h4>
  
  <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-3">
    
    <div class="d-flex align-items-center gap-2">
      <select class="form-select form-select-sm w-auto" [(ngModel)]="pageSize" (change)="cambiarTamanoPagina()">
        <option [ngValue]="10">10 registros/página</option>
        <option [ngValue]="20">20 registros/página</option>
        <option [ngValue]="50">50 registros/página</option>
        <option [ngValue]="100">100 registros/página</option>
      </select>
      <span class="text-muted small">total {{ totalRegistros }} registros.</span>
      <input type="text" class="form-control form-control-sm" placeholder="Buscar y pulsar Enter..." [(ngModel)]="textoBusqueda" (keyup.enter)="buscarEnServidor()" style="width: 200px;">
    </div>
    
    <div class="d-flex align-items-center gap-3">
      
      <div class="position-relative">
        <button class="btn btn-outline-primary btn-sm rounded-pill" style="font-size: 11px;" 
                (click)="toggleMenuColumnas()">
          Seleccionar Columnas 
        </button>
        
        <div *ngIf="mostrarMenuColumnas" 
             class="position-absolute bg-white border rounded shadow-sm p-2" 
             style="top: 100%; right: 0; z-index: 1000; min-width: 170px; margin-top: 5px;">
          
          <div class="form-check ms-2 mb-2 pb-2 border-bottom">
            <input class="form-check-input" type="checkbox" id="chk-all" 
                   [checked]="todasSeleccionadas" 
                   (change)="toggleTodasColumnas($event)">
            <label class="form-check-label fw-bold" style="font-size: 12px; cursor: pointer;" for="chk-all">
              Seleccionar todas
            </label>
          </div>

          <div *ngFor="let col of columnasExportar" class="form-check ms-2 mb-1">
            <input class="form-check-input" type="checkbox" [(ngModel)]="col.seleccionada" [id]="'chk-' + col.prop">
            <label class="form-check-label user-select-none" style="font-size: 12px; cursor: pointer;" [for]="'chk-' + col.prop">
              {{ col.name }}
            </label>
          </div>
        </div>
      </div>

      <div class="d-flex gap-1">
        <button class="btn btn-outline-secondary btn-sm rounded-pill" style="font-size: 11px;" 
                [disabled]="elementosSeleccionados.length === 0" (click)="exportarJSON()">
          JSON
        </button>
        <button class="btn btn-outline-success btn-sm rounded-pill" style="font-size: 11px;" 
                [disabled]="elementosSeleccionados.length === 0" (click)="exportarExcel()">
          EXCEL
        </button>
        <button class="btn btn-outline-secondary btn-sm rounded-pill" style="font-size: 11px;" 
                [disabled]="elementosSeleccionados.length === 0" (click)="exportarCSV()">
          CSV
        </button>
      </div>
    </div>
  </div>

  <div class="table-responsive">
    <ngx-datatable
      class="bootstrap"
      [rows]="listaConcentradores"
      [columnMode]="ColumnMode.force"
      [headerHeight]="50"
      [footerHeight]="50"
      rowHeight="auto"
      [loadingIndicator]="cargando"
      
      [externalPaging]="true"
      [count]="totalRegistros"
      [offset]="currentPage - 1"
      [limit]="pageSize"
      (page)="setPage($event)"
      
      [externalSorting]="true"
      [sorts]="sorts"
      (sort)="onSort($event)"
      
      [selected]="elementosSeleccionados"
      [selectionType]="SelectionType.checkbox"
      (select)="onSelect($event)"
    >
      
      <ngx-datatable-column
        [width]="50"
        [sortable]="false"
        [canAutoResize]="false"
        [draggable]="false"
        [resizeable]="false"
      >
        <ng-template ngx-datatable-header-template let-allRowsSelected="allRowsSelected" let-selectFn="selectFn">
          <input type="checkbox" class="form-check-input m-0" [checked]="allRowsSelected" (change)="selectFn()" />
        </ng-template>
        <ng-template ngx-datatable-cell-template let-isSelected="isSelected" let-onCheckboxChangeFn="onCheckboxChangeFn">
          <input type="checkbox" class="form-check-input m-0" [checked]="isSelected" (change)="onCheckboxChangeFn($event)" />
        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column name="Id" prop="systemid" [width]="100"></ngx-datatable-column>
      <ngx-datatable-column name="Nombre" prop="nombre"></ngx-datatable-column>
      <ngx-datatable-column name="NumSerie" prop="numeroserie"></ngx-datatable-column>
      <ngx-datatable-column name="Objeto" prop="objeto"></ngx-datatable-column>
      
      <ngx-datatable-column name="IMEI" prop="imei">
        <ng-template let-value="value" ngx-datatable-cell-template>
          <span class="text-muted">{{ value }}</span>
        </ng-template>
      </ngx-datatable-column>
      
      <ngx-datatable-column name="Status" prop="status" [width]="80" headerClass="text-center" cellClass="text-center align-middle">
        <ng-template let-value="value" ngx-datatable-cell-template>
          <span *ngIf="value === 0" title="ON" class="d-inline-block rounded-circle" style="width: 14px; height: 14px; background: #4ade80;"></span>
          <span *ngIf="value !== 0" title="OFF" class="d-inline-block rounded-circle" style="width: 14px; height: 14px; background: #f87171;"></span>
        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column name="Server" prop="server"></ngx-datatable-column>
      
      <ngx-datatable-column name="ServerRespaldo" prop="server_backup">
        <ng-template let-value="value" ngx-datatable-cell-template>
          <span class="text-muted">{{ value }}</span>
        </ng-template>
      </ngx-datatable-column>
      
      <ngx-datatable-column name="ServerFota" prop="server_fota"></ngx-datatable-column>

    </ngx-datatable>
  </div>
</div>
